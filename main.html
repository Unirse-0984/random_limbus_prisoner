<!DOCTYPE html>
<html lang="kr">
<head>
    
    <style>
       body {
            background-color: #ffffff;
            color: #000000;
            transition: background-color 0.3s, color 0.3s;
        }

        body.dark-mode {
            background-color: #121212;
            color: #ffffff;
        }

        h1 {
            font-size: 64px;
        }  

        #random-btn {
            font-size: 30px;
            border-radius: 10px;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: bold;
        }
        #random-btn:hover {
            filter: brightness(0.8)
        }
        
        #parent {
            text-align: center;
        }
        
        .first-box {
            margin-bottom: 30px;
            justify-self: start;
            display: inline-block;
        }
        
        #first_img {
            border-radius: 30px;
        }

        .second-box {
            margin-bottom: 30px;
            justify-self: center;
            display: inline-block;
            margin-left: 20px;
            margin-right: 20px;
        }
        
        #second_img {
            border-radius: 30px;
        }

        .third-box {
            margin-bottom: 30px;
            justify-self: end;
            display: inline-block;
        }
        
        #third_img {
            border-radius: 30px;
        }

        #toggleBtn{
            float: right;
        }
        
        .selected-title {
            text-align: center;
            margin-top: 30px;
            margin-bottom: 30px;
            font-size: 24px;
            border: 2px, solid;
            border-radius: 40px;
            width: 200px;
        }

        #selected-list {
            text-align: center;
            width: inherit;
            height: inherit;
        }

        #select-img {
            border-radius: 30px;
            margin: 3px 3px 3px 3px;
        }
        #dark_mod {
            float: right;
            margin-right: 10px;
        }

    </style>
    <script>
        const youtubeUrl = "https://www.youtube.com/embed/51RMDUwU8Zw?si=QJB36tjDKLUcxzFQ&autoplay=1&loop=1&playlist=51RMDUwU8Zw";
        let isPlaying = false;
        let Dark = 0;

        function toggleBGM() {
            const iframe = document.getElementById('bgm');
            const btn = document.getElementById('toggleBtn');

            if (!isPlaying) {
                // 1. 재생하기
                iframe.src = youtubeUrl;
                btn.textContent = "🔊";
                btn.classList.remove('off'); // 빨간색 제거 (초록색으로 변경)
                isPlaying = true;
            } else {
                // 2. 끄기 (src를 비워서 음악을 정지시킵니다)
                iframe.src = "";
                btn.textContent = "🔈";
                btn.classList.add('off'); // 빨간색 추가
                isPlaying = false;
            }
        }
        function DarkMod() {
            const dark_btn = document.getElementById('dark_mod');
            const bodyElement = document.body; // 최상위 부모인 body 가져오기

            if (Dark == 0) {
                dark_btn.textContent = "라이트모드";
                bodyElement.classList.add('dark-mode'); // body에 다크모드 클래스 추가
                Dark = 1;
            } 
            else {
                dark_btn.textContent = "다크모드";
                bodyElement.classList.remove('dark-mode'); // body에서 다크모드 클래스 제거
                Dark = 0;
            }
        }

        let currentDisplayedImages = [];

        function changeImageRandomly() {
        const allImages = Object.values(img_category).flat();

        const selectedImages = new Set();
    
        while (selectedImages.size < 3) {
            const randomIndex = Math.floor(Math.random() * allImages.length);
            selectedImages.add(allImages[randomIndex]);
        }

        currentDisplayedImages = Array.from(selectedImages);

        document.getElementById("first_img").src = currentDisplayedImages[0];
        document.getElementById("second_img").src = currentDisplayedImages[1];
        document.getElementById("third_img").src = currentDisplayedImages[2];

    }

    function moveAndRemoveImage(element) {
            const clickedSrc = element.src;
            if (!clickedSrc || clickedSrc === window.location.href) return; // 빈 이미지 방지

            // ① '선택한 사진' 리스트 영역에 새로운 <img> 태그 생성 및 추가
            const selectedList = document.getElementById("selected-list");
            const newImg = document.createElement("img");
            
            newImg.src = clickedSrc;
            newImg.className = "selected-img"; // 스타일 적용용 클래스
            newImg.id = "select-img"
            selectedList.appendChild(newImg);

            // ② 원본 데이터 배열(img_categories)에서 해당 이미지 주소 제거 (다시는 안 나오게)
            for (let category in img_category) {
                img_category[category] = img_category[category].filter(url => !clickedSrc.includes(url));
            }

            // ③ 선택되어 아래로 내려간 이미지는 상단 구역에서 즉시 비워줌
            element.src = ""; 
            alert("이미지 선택 완료");
            changeImageRandomly()
        }

        // 페이지 로드 시 첫 실행
        window.onload = changeImageRandomly;
    </script>
